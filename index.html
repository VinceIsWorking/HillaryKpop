<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧸</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">Hill's exclusive Kpop Archive</p>
      <h1>Hindex</h1>
      <p class="subtitle">A searchable index of Hillary's K-pop dance videos.</p>
    </header>

    <section class="toolbar">
      <input
        id="searchInput"
        type="text"
        placeholder="Search by song, artist, or location..."
      />

      <button id="toggleArtistMap" class="map-button" type="button">
        Show Artist Board
      </button>
    </section>

    <section id="artistMapSection" class="artist-map-section hidden">
      <div class="artist-map-header">
        <div>
          <h2>Artist Frequency Board</h2>
          <p class="map-note">Bigger cards mean Hillary has more videos from that artist.</p>
        </div>

        <button id="clearArtistFilter" class="clear-filter-button" type="button">
          Clear Filter
        </button>
      </div>

      <div id="artistMap" class="artist-map"></div>
    </section>

    <section id="count" class="count"></section>

<section id="grid" class="grid"></section>

<div class="load-more-wrap">
  <button id="loadMoreButton" class="load-more-button" type="button">
    Load More
  </button>
</div>
  </main>

  <script src="main.js"></script>
</body>
</html>
