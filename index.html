<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hillary Kpop Archive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">K-pop Dance Archive</p>
      <h1>Hillary Kpop</h1>
      <p class="subtitle">A searchable index of Hillary's K-pop dance videos.</p>

    <section class="toolbar">

        id="searchInput"
        type="text"
        placeholder="Search by song, artist, or location..."

    <section id="count" class="count"></section>

    <section id="grid" class="grid"></section>
  </main>

  <script src="main.js"></script>
</body>
</html>
